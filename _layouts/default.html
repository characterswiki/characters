<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | escape }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="canonical" href="{{ site.url }}{{ page.url }}">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
<body>

  {% include header.html %}

  <div class="wrapper">

    <!-- LEFT CONTENT -->
    <main class="content">
      <h1>{{ page.title }}</h1>
      {{ content }}
    </main>

    <!-- RIGHT SIDEBAR -->
    <aside class="sidebar">
      {% include sidebar.html %}
    </aside>

  </div>

  {% include footer.html %}

</body>
</html>
