<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Meta Tags -->
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="robots" content="index, follow">

  <!-- Jekyll SEO Plugin -->
  {% seo %}

  <!-- Favicon -->
  <link rel="icon" href="{{ site.favicon | relative_url }}" type="image/x-icon">

  <!-- Fonts & Styles -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- Optional Smooth Scroll -->
  <style>
    html { scroll-behavior: smooth; }
  </style>
</head>

<body>
<div class="app-container">

  <!-- =======================
       Sidebar Navigation
       ======================= -->
  <aside class="sidebar">
    <div class="sidebar-inner">
      <h1 class="logo">
        <a href="{{ '/' | relative_url }}">{{ site.title | default: "Wiki" }}<span>.</span></a>
      </h1>

      <nav>
        <p class="label">Navigation</p>
        <ul>
          <li><a href="{{ '/' | relative_url }}">🏠 Home</a></li>
          <li><a href="{{ '/categories' | relative_url }}">📂 Categories</a></li>
          <li><a href="{{ '/characters' | relative_url }}">🧑 Characters</a></li>
        </ul>

        <p class="label">Top Series</p>
        <ul>
          {% assign sorted_categories = site.categories | sort %}
          {% for category in sorted_categories limit:5 %}
            <li>
              <a href="{{ '/categories#' | append: category | first | slugify | relative_url }}">
                🔥 {{ category | first }}
              </a>
            </li>
          {% endfor %}
        </ul>
      </nav>
    </div>
  </aside>

  <!-- =======================
       Main Content Area
       ======================= -->
  <main class="content-area">
    {{ content }}
  </main>

</div>

<!-- =======================
     Responsive Sidebar Toggle
     ======================= -->
<script>
  const sidebar = document.querySelector('.sidebar');
  const toggleBtn = document.createElement('button');
  toggleBtn.innerText = '☰';
  toggleBtn.classList.add('sidebar-toggle');
  document.body.prepend(toggleBtn);

  toggleBtn.addEventListener('click', () => {
    sidebar.classList.toggle('open');
  });
</script>

</body>
</html>
