---
layout: default
---
<article class="post-detail">
  <h1>{{ page.title }}</h1>
  <p class="post-date">{{ page.date | date: "%b %d, %Y" }}</p>
  {% if page.image %}
  <img class="featured" src="{{ page.image }}" alt="{{ page.title }}">
  {% endif %}
  <div class="post-content">
    {{ content }}
  </div>
</article>
