<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>

  <!-- SEO Meta -->
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <meta name="keywords" content="{% if page.tags %}{{ page.tags | join: ', ' }}{% endif %}">
  <meta name="author" content="{{ page.creator | default: site.author }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">

  <style>
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
      color: #333;
    }

    /* Wrapper matches homepage style */
    .wrapper {
      max-width: 1300px;
      margin: 0 auto;
      padding: 2rem 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
    }

    /* Main post content */
    main.post-content {
      flex: 1 1 700px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.08);
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    main.post-content:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.12);
    }

    /* Featured Image like homepage cards */
    .featured-image {
      width: 100%;
      max-height: 400px;
      overflow: hidden;
      border-bottom: 1px solid #eee;
    }
    .featured-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .featured-image:hover img {
      transform: scale(1.08);
    }

    /* Post title */
    main.post-content h1 {
      font-size: 2.5rem;
      margin: 1.5rem 2rem 1rem;
      line-height: 1.2;
      color: #111;
      text-transform: capitalize;
    }

    /* Article body matching homepage card style */
    .article-body {
      padding: 0 2rem 2rem;
      font-size: 1rem;
      line-height: 1.8;
      color: #444;
    }
    .article-body a {
      color: #1e90ff;
      text-decoration: underline;
      transition: color 0.3s;
    }
    .article-body a:hover {
      color: #0077cc;
    }
    .article-body .read-more {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      background: #1e90ff;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      transition: background 0.3s;
    }
    .article-body .read-more:hover {
      background: #0077cc;
    }

    /* Sidebar like homepage right column */
    aside.sidebar {
      flex: 0 0 300px;
      min-width: 280px;
    }

    /* Responsive adjustments */
    @media (max-width: 900px) {
      .wrapper { flex-direction: column; padding: 1rem; }
      main.post-content { width: 100%; }
      aside.sidebar { width: 100%; }
      .featured-image { max-height: 300px; }
      main.post-content h1 { font-size: 2rem; margin: 1rem; }
      .article-body { padding: 0 1rem 1.5rem; font-size: 0.95rem; }
    }
  </style>
</head>
<body>

  {% include header.html %}

  <div class="wrapper">

    <!-- Main Post -->
    <main class="post-content">

      <!-- Featured Image -->
      {% assign featured_img = page.featured_image | default: page.image | default: page.thumbnail %}
      {% if featured_img %}
        <div class="featured-image">
          <img src="{{ '/assets/images/' | append: featured_img | relative_url }}"
               alt="{{ page.title | escape }}" loading="lazy">
        </div>
      {% endif %}

      <!-- Post Title -->
      <h1>{{ page.title }}</h1>

      <!-- Article Body -->
      <div class="article-body">
        {{ content }}
      </div>

    </main>

    <!-- Sidebar like homepage -->
    <aside class="sidebar">
      {% include sidebar.html %}
    </aside>

  </div>

  {% include footer.html %}

</body>
</html>
