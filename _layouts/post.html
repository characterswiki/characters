<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | escape }}">
  <meta name="keywords" content="{% for tag in page.tags %}{{ tag }}{% unless forloop.last %}, {% endunless %}{% endfor %}">
  <meta name="author" content="{{ page.creator | default: site.author }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="canonical" href="{{ site.url }}{{ page.url }}">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
<body>

  {% include header.html %}

  <div class="wrapper site-main">

    <!-- Sidebar -->
    <aside class="sidebar">
      {% include sidebar.html %}
    </aside>

    <!-- Article Content -->
    <article class="post-content">

      {% if page.image %}
        <div class="featured-image">
          <img src="{{ page.image }}" alt="{{ page.character_name | default: page.title }}" loading="lazy">
        </div>
      {% endif %}

      <h1>{{ page.title }}</h1>
      {{ content | markdownify | link_characters }}

    </article>
  </div>

  {% include footer.html %}

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "{{ page.character_name | escape }}",
    "alternateName": "{{ page.alias | default: page.character_name | escape }}",
    "gender": "{{ page.gender | default: 'Unknown' }}",
    "creator": {
      "@type": "Person",
      "name": "{{ page.creator | default: 'Unknown' }}"
    },
    "url": "{{ site.url }}{{ page.url }}",
    "worksFor": {
      "@type": "Organization",
      "name": "{{ page.series | default: site.title }}"
    }
  }
  </script>

  <script src="{{ site.baseurl }}/assets/js/main.js"></script>
</body>
</html>
