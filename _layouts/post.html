<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>

  <!-- SEO Meta -->
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <meta name="keywords" content="{% if page.tags %}{{ page.tags | join: ', ' }}{% endif %}">
  <meta name="author" content="{{ page.creator | default: site.author }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">

  <style>
    /* Featured Image */
    .featured-image {
      width: 100%;
      max-height: 550px;
      overflow: hidden;
      margin-bottom: 2rem;
      border-radius: 16px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.18);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }
    .featured-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
      border-radius: 16px;
    }
    .featured-image:hover img {
      transform: scale(1.1);
    }

    /* Post Content */
    .post-content {
      background: #fff;
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
      margin-bottom: 2rem;
      transition: box-shadow 0.3s;
    }
    .post-content:hover {
      box-shadow: 0 16px 48px rgba(0,0,0,0.12);
    }
    .post-content h1 {
      margin-bottom: 1rem;
      font-size: 2.8rem;
      color: #111;
      line-height: 1.2;
      text-transform: capitalize;
    }
    .article-body {
      line-height: 1.8;
      color: #333;
      font-size: 1rem;
    }
    .article-body a {
      color: #1e90ff;
      text-decoration: underline;
      transition: color 0.3s;
    }
    .article-body a:hover {
      color: #0077cc;
    }
    .article-body .read-more {
      display: inline-block;
      margin-top: 1.2rem;
      padding: 0.6rem 1.2rem;
      background: #1e90ff;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      transition: background 0.3s;
    }
    .article-body .read-more:hover {
      background: #0077cc;
    }

    /* Layout */
    .wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 2.5rem;
      max-width: 1300px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    main.post-content {
      flex: 1 1 700px;
      min-width: 320px;
    }
    aside.sidebar {
      flex: 0 0 300px;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .wrapper { flex-direction: column; }
      aside.sidebar { flex: 1 1 auto; }
    }
  </style>
</head>
<body>

  {% include header.html %}

  <div class="wrapper">

    <!-- Main Article -->
    <main class="post-content">

      <!-- Featured Image -->
      {% assign featured_img = page.featured_image | default: page.image | default: page.thumbnail %}
      {% if featured_img %}
        <div class="featured-image">
          <img src="{{ '/assets/images/' | append: featured_img | relative_url }}" 
               alt="{{ page.title | escape }}" loading="lazy">
        </div>
      {% endif %}

      <h1>{{ page.title }}</h1>

      <div class="article-body">
        {{ content }}
      </div>

    </main>

    <!-- Sidebar -->
    <aside class="sidebar">
      {% include sidebar.html %}
    </aside>

  </div>

  {% include footer.html %}

</body>
</html>
