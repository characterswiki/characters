<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | escape }}">
    <meta name="keywords" content="{% for tag in page.tags %}{{ tag }}{% unless forloop.last %}, {% endunless %}{% endfor %}">
    <meta name="author" content="{{ page.creator | default: site.author }}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="canonical" href="{{ site.url }}{{ page.url }}">
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
  </head>
  <body>
    <header>
      <h1>{{ page.title }}</h1>
    </header>

    <main>
      <article>
        {{ content }}
      </article>
    </main>

    <footer>
      <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}</p>
    </footer>

    <!-- JSON-LD Schema for character post -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "{{ page.character_name | escape }}",
      "alternateName": "{{ page.alias | default: page.character_name | escape }}",
      "gender": "{{ page.gender | default: 'Unknown' }}",
      "creator": {
        "@type": "Person",
        "name": "{{ page.creator | default: 'Unknown' }}"
      },
      "url": "{{ site.url }}{{ page.url }}",
      "image": "{{ site.url }}{{ page.image | default: '/assets/images/placeholder.png' }}",
      "worksFor": {
        "@type": "Organization",
        "name": "{{ page.series | default: site.title }}"
      }
    }
    </script>
  </body>
</html>
