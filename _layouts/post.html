---
layout: default
title: "{{ page.title }}"
---

{% assign featured_img = page.featured_image | default: page.image | default: page.thumbnail %}

<div class="wrapper">

  {% if featured_img %}
  <div class="featured-image">
    <!-- Pull image from assets/images/ by name -->
    <img src="{{ site.baseurl }}/assets/images/{{ featured_img }}" alt="{{ page.title }}" loading="lazy">
  </div>
  {% endif %}

  <main class="post-content">
    <h1>{{ page.title }}</h1>

    <div class="article-body">
      {{ content | markdownify }}
    </div>
  </main>
</div>

<!-- Post Layout Styles -->
<style>
.wrapper {
  max-width:1300px;
  margin:2rem auto;
  padding:0 1rem;
  display:flex;
  flex-direction:column;
  gap:2rem;
}

/* Featured Image */
.featured-image {
  width:100%;
  max-height:500px;
  overflow:hidden;
  border-radius:16px;
  margin-bottom:2rem;
  box-shadow:0 8px 24px rgba(0,0,0,0.15);
}
.featured-image img {
  width:100%;
  height:100%;
  object-fit:cover;
  transition:transform 0.3s;
}
.featured-image:hover img { transform:scale(1.05); }

/* Post Content */
main.post-content {
  background:#fff;
  padding:2rem;
  border-radius:16px;
  box-shadow:0 8px 32px rgba(0,0,0,0.08);
  display:flex;
  flex-direction:column;
  gap:1.5rem;
}
main.post-content h1 {
  margin:0;
  font-size:2.5rem;
  color:#111;
  line-height:1.2;
}
.article-body {
  font-size:1rem;
  line-height:1.8;
  color:#333;
}
.article-body a {
  color:#1e90ff;
  text-decoration:underline;
}
.article-body a:hover { color:#0077cc; }

/* Read More Button */
.article-body .read-more {
  display:inline-block;
  margin-top:1rem;
  padding:0.5rem 1rem;
  background:#1e90ff;
  color:#fff;
  border-radius:8px;
  text-decoration:none;
  transition:background 0.3s;
}
.article-body .read-more:hover { background:#0077cc; }

/* Responsive */
@media(max-width:900px){
  main.post-content { padding:1rem; }
  main.post-content h1 { font-size:2rem; }
  .featured-image { max-height:300px; }
}
@media(max-width:500px){
  .wrapper { padding:0 0.5rem; }
}
</style>
