---
layout: default
---

<h1>Latest Anime & Manga Characters</h1>

<div class="grid">
{% for post in site.posts %}
  <article class="card">
    <a href="{{ site.baseurl }}{{ post.url }}">
      <img src="{{ site.baseurl }}{{ post.image }}" alt="{{ post.title }}">
      <h2>{{ post.title }}</h2>
    </a>
    <p>{{ post.excerpt | strip_html | truncate: 140 }}</p>
  </article>
{% endfor %}
</div>
