---
layout: default
title: Home
---

<main id="main-content" class="home-content">

<div class="container">

<!-- Latest Posts -->
<section class="featured-posts" aria-labelledby="latest-heading">

<h2 id="latest-heading">Latest Posts</h2>

<div class="posts-grid">

{% for post in site.posts limit:6 %}

<article class="post-card">

<a href="{{ post.url | relative_url }}" class="post-image">

<img
src="{% if post.image %}{{ post.image | relative_url }}{% else %}{{ '/assets/images/default-post.jpg' | relative_url }}{% endif %}"
alt="{{ post.title }}"
loading="lazy">

</a>

<div class="post-content">

{% if post.date %}
<time datetime="{{ post.date | date_to_xmlschema }}" class="post-date">
{{ post.date | date: "%B %d, %Y" }}
</time>
{% endif %}

<h3 class="post-title">
<a href="{{ post.url | relative_url }}">
{{ post.title }}
</a>
</h3>

<p class="post-excerpt">
{{ post.excerpt | strip_html | truncate: 180 }}
</p>

<a href="{{ post.url | relative_url }}" class="post-read-more">
Read Full Article →
</a>

</div>

</article>

{% endfor %}

</div>

</section>

</div>

</main>
