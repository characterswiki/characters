# -----------------------------
# SITE IDENTITY
# -----------------------------
title: "Characters Wiki"
description: "A comprehensive database for character profiles, power levels, and lore."
url: "https://characterswiki.github.io"
baseurl: "/characters"   # Required for GitHub project pages

author:
  name: "Characters Wiki"
  email: "contact@characterswiki.com"

language: "en"

# -----------------------------
# SEO SETTINGS
# -----------------------------
permalink: /:categories/:title/

timezone: Asia/Karachi

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

# -----------------------------
# PLUGINS
# -----------------------------
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate

# -----------------------------
# PAGINATION
# -----------------------------
paginate: 10
paginate_path: "/page/:num/"

# -----------------------------
# COLLECTIONS
# -----------------------------
collections:
  characters:
    output: true
    permalink: /characters/:name/

# -----------------------------
# DEFAULT FRONT MATTER
# -----------------------------
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Characters Wiki"

  - scope:
      path: ""
      type: "characters"
    values:
      layout: "page"

# -----------------------------
# BUILD SETTINGS
# -----------------------------
exclude:
  - README.md
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock

include:
  - _pages

# -----------------------------
# SASS / CSS
# -----------------------------
sass:
  style: compressed

# -----------------------------
# FEED SETTINGS
# -----------------------------
feed:
  path: rss.xml

# -----------------------------
# SOCIAL (Used by SEO plugin)
# -----------------------------
twitter:
  username: characterswiki

social:
  name: Characters Wiki
  links:
    - https://github.com/characterswiki

# -----------------------------
# GOOGLE SEARCH CONSOLE
# -----------------------------
google_site_verification: ""

# -----------------------------
# PERFORMANCE
# -----------------------------
lsi: false
safe: true
incremental: false
