title: "Characters Wiki"
email: your-email@example.com
description: >-
  A wiki and blog about fictional characters – their stories, traits,
  and the worlds they inhabit.
baseurl: "/characters" # the subpath of your site, e.g. /blog
url: "https://characterswiki.github.io" # the base hostname & protocol
twitter_username: your-twitter
github_username:  your-github

# Build settings
theme: null # we use custom styles
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-archives

# Permalinks
permalink: /:year/:month/:day/:title/

# Collections (if any)
# collections:
#   characters:
#     output: true

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Your Name"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md
