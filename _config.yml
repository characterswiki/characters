# Site Settings
title: "Characters Wiki"
email: "your-email@example.com"
description: >-
  Encyclopedia of anime, manga and game characters
baseurl: ""                                # Empty for Vercel (root)
url: "https://characterswiki.vercel.app"   # Your live Vercel URL

# Build Settings
markdown: kramdown
theme: null
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives

# Permalinks
permalink: /:title/

# Kramdown Settings – ensures TOC works for all headings
kramdown:
  auto_ids: true           # Automatically generates id="" for headings
  toc_levels: 2..3         # TOC will include h2 and h3
  hard_wrap: false
  syntax_highlighter_opts:
    line_numbers: false

# Default Front Matter – fixes layout issues for all posts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      tags: []                    # default empty array if missing
      categories: []              # default empty array
      related: false              # prevents layout break if missing
      last_modified_at: null      # for updated date
      excerpt: ""                 # avoids blank summary issues
      image: "/assets/images/default-character.jpg"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Jekyll Archives (Category & Tag pages)
jekyll-archives:
  enabled:
    - categories
    - tags
  layout: 'archive'
  permalinks:
    category: '/categories/:slug/'
    tag: '/tags/:slug/'

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
