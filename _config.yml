title: "Characters Wiki"
email: your-email@example.com
description: "Explore amazing characters from anime, games, and comics!"
baseurl: "/characters"
url: "https://characterswiki.github.io"
twitter_username: your-twitter
github_username: characterswiki

# Build settings
theme: null
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

paginate: 8  # posts per page

# Default permalink structure
permalink: /:title/

# Collections for characters
collections:
  characters:
    output: true
    permalink: /:title/

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Admin"
      image: "/assets/images/default-character.jpg"
      permalink: /:title/
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
      permalink: /:title/

# Exclude unnecessary files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
