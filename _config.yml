# Site Settings
title: "Characters Wiki"
email: "your-email@example.com"
description: >-
  Encyclopedia of anime, manga and game characters
baseurl: "/characters"
url: "https://characterswiki.github.io"

# Build Settings
markdown: kramdown
theme: null
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives

# Permalinks
permalink: /:title/

# Default Front Matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      image: "/assets/images/default-character.jpg"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Jekyll Archives (Category & Tag pages) – using :slug to match links
jekyll-archives:
  enabled:
    - categories
    - tags
  layout: 'archive'
  permalinks:
    category: '/categories/:slug/'
    tag: '/tags/:slug/'

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
