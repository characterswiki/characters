# ==============================================
# Characters Wiki - Modern SEO & Mobile-Friendly Config
# ==============================================

# Site info
title: "Characters Wiki"
description: "The ultimate professional anime/manga character database."
url: "https://characterswiki.github.io"
baseurl: "/characters"  # Important: matches your GitHub Pages subpath
twitter_username: "characterswiki"
github_username: "characterswiki"
logo: "/assets/images/logo.png"    # optional site logo for SEO & social
favicon: "/assets/images/favicon.ico"

# Build & Layout Settings
markdown: kramdown
highlighter: rouge
theme: null        # custom theme
sass:
  style: compressed
permalink: "/:categories/:title/"  # SEO-friendly permalinks

# Default Layouts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Collections
collections:
  posts:
    output: true
  characters:
    output: true
    permalink: "/characters/:title/"

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-archives

# SEO defaults
seo:
  title: "Characters Wiki"
  description: "The ultimate professional anime/manga character database."
  twitter:
    card: summary_large_image
  og:
    type: website
    image: "/assets/images/seo-image.png"

# Pagination
paginate: 10
paginate_path: "/page/:num/"

# Markdown & code highlighting
kramdown:
  input: GFM
  syntax_highlighter_opts:
    line_numbers: true
    span: true

# Exclude unnecessary files from build
exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md

include:
  - _pages

# Future posts
future: true
incremental: true
lsi: false
