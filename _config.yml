title: "Characters Wiki"
description: "The ultimate professional anime/manga character database."
url: "https://characterswiki.github.io"
baseurl: "/characters"
twitter_username: "characterswiki"
github_username: "characterswiki"
logo: "/assets/images/logo.png"
favicon: "/assets/images/favicon.ico"

# ================= Build & Layout =================
markdown: kramdown
highlighter: rouge
permalink: "/:categories/:title/"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# ================= Collections =================
collections:
  characters:
    output: true
    permalink: "/characters/:title/"

# ================= Plugins =================
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-archives
  - jekyll-paginate-v2  # modern pagination plugin

# ================= Pagination =================
paginate: 10
paginate_path: "/page/:num/"

# ================= Markdown & Code =================
kramdown:
  input: GFM
  syntax_highlighter_opts:
    line_numbers: true
    span: true

# ================= Theme & Styling =================
theme: null
sass:
  style: compressed

# ================= Exclude =================
exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md

# ================= Future & Performance =================
future: true
incremental: true
