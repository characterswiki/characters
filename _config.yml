title: Characters Wiki
description: Encyclopedia of anime, manga and game characters
baseurl: "/characters"
url: "https://characterswiki.github.io"

permalink: /:title/

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-archives

jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: category
    tag: tag
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

markdown: kramdown
highlighter: rouge
