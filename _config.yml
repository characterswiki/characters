title: "Characters Wiki"
description: "Anime & Manga Character Database"
url: "https://characterswiki.github.io"
baseurl: "/characters"

markdown: kramdown
permalink: /:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  characters:
    output: true
    permalink: /character/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
