# ==============================================
# Characters Wiki - Modern SEO & Mobile-Friendly Config
# ==============================================

title: "Characters Wiki"
description: "The ultimate professional anime/manga character database."
url: "https://characterswiki.github.io"
baseurl: "/characters"  # Important: matches your GitHub Pages subpath
twitter_username: "characterswiki"
github_username: "characterswiki"
logo: "/assets/images/logo.png" # optional site logo for SEO & social
favicon: "/assets/images/favicon.ico" # optional favicon

# ==============================================
# Build & Layout Settings
# ==============================================
markdown: kramdown
highlighter: rouge
permalink: "/:categories/:title/"  # SEO-friendly permalinks

# Default Layouts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# ==============================================
# Collections (for advanced structure)
# ==============================================
collections:
  posts:
    output: true
  characters:
    output: true
    permalink: "/characters/:title/"

# ==============================================
# SEO Enhancements
# ==============================================
plugins:
  - jekyll-seo-tag     # Auto meta tags, Twitter Cards, OpenGraph
  - jekyll-feed        # RSS feed for SEO & subscribers
  - jekyll-sitemap     # Sitemap.xml for Google indexing
  - jekyll-paginate    # Pagination for blog pages
  - jekyll-archives    # Category & tag archive pages

# Optional SEO metadata defaults
seo:
  title: "Characters Wiki"
  description: "The ultimate professional anime/manga character database."
  twitter:
    card: summary_large_image
  og:
    type: website
    image: "/assets/images/seo-image.png" # default OpenGraph image

# ==============================================
# Markdown & Code Highlighting
# ==============================================
kramdown:
  input: GFM
  syntax_highlighter_opts:
    line_numbers: true
    span: true

# ==============================================
# Pagination
# ==============================================
paginate: 10
paginate_path: "/page/:num/"

# ==============================================
# Theme & Styling
# ==============================================
theme: null # custom modern theme
sass:
  style: compressed

# ==============================================
# Exclude / Include
# ==============================================
exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md

include:
  - _pages

# ==============================================
# Future-Proofing & Performance
# ==============================================
future: true
incremental: true
lsi: false
