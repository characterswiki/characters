title: "Characters Wiki"
email: your-email@example.com
description: >-
  Explore amazing characters from anime, games, and comics!
baseurl: "/characters"   # MUST match your repository name
url: "https://characterswiki.github.io"
twitter_username: your-twitter
github_username:  characterswiki

# Build settings
theme: null
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Permalinks – ensure clean URLs without .html
permalink: pretty

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "admin"
      image: "https://via.placeholder.com/800x400?text=Anime+Character"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .gitignore
