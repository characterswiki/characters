title: "Characters Wiki"
email: your-email@example.com
description: >-
  A wiki and blog about fictional characters – their stories, traits,
  and the worlds they inhabit.
baseurl: "/characters"
url: "https://characterswiki.github.io"
twitter_username: your-twitter
github_username:  your-github

# Build settings
theme: null
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-paginate-v2      # advanced pagination
  - jekyll-tagging           # tag pages and cloud

# Pagination v2
pagination:
  enabled: true
  per_page: 5
  permalink: '/page/:num/'
  title: ':title – page :num'
  limit: 0
  sort_field: 'date'
  sort_reverse: true

# jekyll-archives configuration
jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: archive
    tag: archive
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

# Tag cloud settings (for jekyll-tagging)
tag_page_layout: tag_page
tag_page_dir: tag
tag_permalink_style: pretty

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Your Name"
      image: /assets/images/default-social.jpg   # fallback social image
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Exclude
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md
