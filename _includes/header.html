<header class="site-header">

  <!-- Logo -->
  <div class="logo">
    <a href="{{ '/' | relative_url }}">
      {{ site.title }}
    </a>
  </div>

  <!-- Navigation -->
  <nav class="site-nav">

    <ul>

      <li>
        <a href="{{ '/' | relative_url }}"
           class="{% if page.url == '/' %}active{% endif %}">
           Home
        </a>
      </li>

      <li>
        <a href="{{ '/categories/' | relative_url }}"
           class="{% if page.url contains 'category' %}active{% endif %}">
           Categories
        </a>
      </li>

      <li>
        <a href="{{ '/tags/' | relative_url }}"
           class="{% if page.url contains 'tag' %}active{% endif %}">
           Tags
        </a>
      </li>

      <li>
        <a href="{{ '/about/' | relative_url }}"
           class="{% if page.url contains 'about' %}active{% endif %}">
           About
        </a>
      </li>

      <li>
        <a href="{{ '/contact/' | relative_url }}"
           class="{% if page.url contains 'contact' %}active{% endif %}">
           Contact
        </a>
      </li>

      <li>
        <a href="{{ '/privacy-policy/' | relative_url }}">
          Privacy
        </a>
      </li>

      <li>
        <a href="{{ '/terms/' | relative_url }}">
          Terms
        </a>
      </li>

      <!-- Dark Mode Button -->
      <li>
        <button id="theme-toggle">🌙</button>
      </li>

    </ul>

  </nav>

</header>
