<header class="site-header">
  <div class="header-container">
    <!-- Logo -->
    <a href="{{ '/characters/' | relative_url }}" class="site-logo">
      <span class="icon">🏮</span> Characters<strong>Wiki</strong>
    </a>

    <!-- Hamburger Menu for Mobile -->
    <button class="menu-toggle" aria-label="Toggle navigation">☰</button>

    <!-- Navigation Links -->
    <nav class="main-nav">
      <a href="{{ '/characters/' | relative_url }}">Home</a>
      <a href="{{ '/characters/categories/' | relative_url }}">Categories</a>
      <a href="{{ '/characters/tags/' | relative_url }}">Tags</a>
      <a href="{{ '/characters/about/' | relative_url }}">About</a>
      <a href="{{ '/characters/sitemap.xml' | relative_url }}">Sitemap</a>
    </nav>

    <!-- Search -->
    <div class="search-container">
      <input type="text" id="search-input" placeholder="Search characters..." aria-label="Search characters">
    </div>
  </div>
</header>

<!-- Optional: Search Results Container -->
<div id="search-results" class="search-results" aria-live="polite"></div>

<style>
  :root {
    --accent: #ff4757;
    --sidebar-bg: #1e293b;
  }

  /* Header */
  .site-header {
    position: sticky;
    top: 0;
    background: var(--sidebar-bg);
    padding: 1rem 2rem;
    z-index: 1000;
    box-shadow: 0 2px 5px rgba(0,0,0,0.15);
  }

  .header-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    max-width: 1200px;
    margin: 0 auto;
    gap: 0.5rem;
  }

  .site-logo {
    font-size: 1.6rem;
    font-weight: 600;
    color: white;
    text-decoration: none;
    display: flex;
    align-items: center;
  }

  .site-logo .icon {
    margin-right: 0.5rem;
  }

  /* Navigation */
  .main-nav {
    display: flex;
    gap: 20px;
  }

  .main-nav a {
    color: #e2e8f0;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s ease;
  }

  .main-nav a:hover {
    color: var(--accent);
  }

  /* Search Box */
  .search-container input {
    padding: 0.5rem 1rem;
    border-radius: 8px;
    border: none;
    font-size: 1rem;
    outline: none;
    width: 250px;
    max-width: 100%;
    transition: box-shadow 0.3s ease;
  }

  .search-container input:focus {
    box-shadow: 0 0 0 3px var(--accent);
  }

  /* Hamburger toggle for mobile */
  .menu-toggle {
    display: none;
    font-size: 24px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .main-nav {
      display: none;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }
    .main-nav.show {
      display: flex;
    }
    .menu-toggle {
      display: block;
    }
    .search-container {
      width: 100%;
      margin-top: 0.5rem;
    }
  }
</style>

<script>
  // Mobile menu toggle
  const toggle = document.querySelector('.menu-toggle');
  const nav = document.querySelector('.main-nav');
  toggle.addEventListener('click', () => { nav.classList.toggle('show'); });

  // Simple live search for character cards
  const searchInput = document.getElementById('search-input');
  searchInput.addEventListener('input', () => {
    const query = searchInput.value.toLowerCase();
    document.querySelectorAll('.character-card').forEach(card => {
      const title = card.querySelector('.card-title').textContent.toLowerCase();
      card.style.display = title.includes(query) ? '' : 'none';
    });
  });
</script>
