<header class="site-header">
    <div class="container site-header__container">
        <div class="site-header__branding">
            <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
        </div>
        
        <nav class="site-nav">
            <button class="site-nav__toggle" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <ul class="site-nav__menu">
                <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
                <li><a href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}class="active"{% endif %}>About</a></li>
                <li><a href="{{ '/archive/' | relative_url }}" {% if page.url == '/archive/' %}class="active"{% endif %}>All Posts</a></li>
            </ul>
        </nav>
        
        <div class="site-search">
            <input type="text" id="search-input" placeholder="Search characters..." aria-label="Search">
            <div id="search-results" class="search-results"></div>
        </div>
    </div>
</header>
