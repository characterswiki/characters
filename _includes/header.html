<header class="site-header">
  <div class="header-wrapper">
    <div class="site-title">
      <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
    </div>
    <nav class="main-nav" aria-label="Main navigation">
      <button class="menu-toggle" aria-label="Toggle menu">☰</button>
      <ul class="nav-list">
        <li{% if page.url == '/' %} class="active"{% endif %}><a href="{{ '/' | relative_url }}">Home</a></li>
        <li{% if page.url contains '/categories' %} class="active"{% endif %}><a href="{{ '/categories/' | relative_url }}">Categories</a></li>
        <li{% if page.url contains '/tags' %} class="active"{% endif %}><a href="{{ '/tags/' | relative_url }}">Tags</a></li>
        <li{% if page.url contains '/about' %} class="active"{% endif %}><a href="{{ '/about/' | relative_url }}">About</a></li>
        <li{% if page.url contains '/contact' %} class="active"{% endif %}><a href="{{ '/contact/' | relative_url }}">Contact</a></li>
      </ul>
    </nav>
    <button class="theme-toggle" aria-label="Toggle dark mode">🌓</button>
  </div>
</header>
