<header class="site-header">
  <div class="header-container">

    <!-- Logo -->
    <div class="logo">
      <a href="{{ site.baseurl }}/">{{ site.title }}</a>
    </div>

    <!-- Navigation -->
    <nav class="site-nav">
      <ul>
        <li><a href="{{ '/' | relative_url }}">Home</a></li>
        <li><a href="{{ '/about/' | relative_url }}">About</a></li>
        <li><a href="{{ '/categories/' | relative_url }}">Categories</a></li>
        <li><a href="{{ '/tags/' | relative_url }}">Tags</a></li>
        <li><a href="{{ '/contact/' | relative_url }}">Contact</a></li>
        <li><a href="{{ '/privacy-policy/' | relative_url }}">Privacy Policy</a></li>
      </ul>
    </nav>

    <!-- Mobile Menu Toggle -->
    <div class="menu-toggle" id="menu-toggle">
      ☰
    </div>
  </div>

  <!-- Styles -->
  <style>
    .site-header {
      background: #111;
      color: #fff;
      padding: 1rem 2rem;
      font-family: sans-serif;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1300px;
      margin: 0 auto;
    }

    .logo a {
      color: #1e90ff;
      font-size: 1.5rem;
      font-weight: bold;
      text-decoration: none;
    }

    .site-nav ul {
      display: flex;
      gap: 1.5rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .site-nav a {
      color: #eee;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }

    .site-nav a:hover {
      color: #1e90ff;
    }

    /* Mobile Menu Toggle */
    .menu-toggle {
      display: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: #1e90ff;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .site-nav ul {
        flex-direction: column;
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: #111;
        display: none;
      }

      .site-nav ul.show {
        display: flex;
      }

      .site-nav li {
        padding: 1rem 2rem;
        border-top: 1px solid #222;
      }

      .menu-toggle {
        display: block;
      }
    }
  </style>

  <!-- Script for Mobile Toggle -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const toggle = document.getElementById("menu-toggle");
      const nav = document.querySelector(".site-nav ul");
      toggle.addEventListener("click", function() {
        nav.classList.toggle("show");
      });
    });
  </script>
</header>
