<header class="site-header">
  <div class="logo">
    <a href="{{ site.baseurl }}/">{{ site.title }}</a>
  </div>

  <nav class="site-nav">
    <ul>
      <li>
        <a href="{{ site.baseurl }}/"
           class="{% if page.url == '/' %}active{% endif %}">
           Home
        </a>
      </li>

      <li>
        <a href="{{ site.baseurl }}/about"
           class="{% if page.url contains 'about' %}active{% endif %}">
           About
        </a>
      </li>

      <li>
        <a href="{{ site.baseurl }}/categories"
           class="{% if page.url contains 'categories' %}active{% endif %}">
           Categories
        </a>
      </li>

      <li>
        <a href="{{ site.baseurl }}/tags"
           class="{% if page.url contains 'tags' %}active{% endif %}">
           Tags
        </a>
      </li>

      <li>
        <a href="{{ site.baseurl }}/contact"
           class="{% if page.url contains 'contact' %}active{% endif %}">
           Contact
        </a>
      </li>

      <li>
        <a href="{{ site.baseurl }}/privacy-policy"
           class="{% if page.url contains 'privacy-policy' %}active{% endif %}">
           Privacy Policy
        </a>
      </li>

    </ul>
  </nav>
</header>
