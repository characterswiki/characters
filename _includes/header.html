<header class="header">
  <div class="logo">
    <a href="{{ '/' | relative_url }}">CharactersWiki</a>
  </div>

  <nav class="nav">
    <a href="{{ '/' | relative_url }}">Home</a>
    <div class="dropdown">
      <a href="{{ '/categories.md' | relative_url }}">Categories <i class="fa fa-caret-down"></i></a>
      <div class="dropdown-content">
        {% assign cats = site.categories %}
        {% for cat in cats %}
        <a href="{{ '/categories.md' | relative_url }}">{{ cat[0] }}</a>
        {% endfor %}
      </div>
    </div>
    <a href="{{ '/about.md' | relative_url }}">About</a>
    <a href="#" class="search-toggle"><i class="fa fa-search"></i></a>
  </nav>

  <div class="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="mobile-menu">
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/categories.md' | relative_url }}">Categories</a>
    <a href="{{ '/about.md' | relative_url }}">About</a>
  </div>

  <div class="search-bar">
    <input type="text" id="headerSearch" placeholder="Search posts...">
  </div>
</header>
