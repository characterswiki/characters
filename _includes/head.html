<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>
{% if page.title %}
{{ page.title }} | {{ site.title }}
{% else %}
{{ site.title }}
{% endif %}
</title>

<meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
<meta name="robots" content="index, follow">
<meta name="author" content="{{ site.author }}">
<link rel="canonical" href="{{ site.url }}{{ site.baseurl }}{{ page.url }}">

<meta property="og:type" content="article">
<meta property="og:title" content="{{ page.title }}">
<meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
<meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
<meta property="og:image" content="{{ site.url }}{{ site.baseurl }}{{ page.image }}">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title }}">
<meta name="twitter:description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
<meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}{{ page.image }}">

{% if page.layout == "post" and page.character_name %}
<script type="application/ld+json">
{
 "@context": "https://schema.org",
 "@type": "FictionalCharacter",
 "name": "{{ page.character_name }}",
 "alternateName": "{{ page.alias }}",
 "image": "{{ site.url }}{{ site.baseurl }}{{ page.image }}",
 "description": "{{ page.excerpt | strip_html }}",
 "gender": "{{ page.gender }}",
 "creator": {
   "@type": "Person",
   "name": "{{ page.creator }}"
 },
 "isPartOf": {
   "@type": "CreativeWork",
   "name": "{{ page.series }}"
 },
 "url": "{{ site.url }}{{ site.baseurl }}{{ page.url }}"
}
</script>
{% endif %}

<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
