{% assign headings = include.html | split: '<h2' %}
{% if headings.size > 1 %}
<ul class="toc-list">
  {% for heading in headings offset:1 %}
    {% assign id_part = heading | split: 'id="' | last | split: '"' | first %}
    {% assign text_part = heading | split: '</h2' | first | strip_html | strip %}
    <li><a href="#{{ id_part }}">{{ text_part }}</a></li>
  {% endfor %}
</ul>
{% endif %}
