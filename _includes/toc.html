{% assign headers = include.html | split: '<h2' %}
<ul class="toc-list">
  {% for header in headers offset:1 %}
    {% assign header_parts = header | split: '</h2' | first %}
    {% assign id = header_parts | split: 'id="' | last | split: '"' | first %}
    {% assign text = header_parts | strip_html | strip %}
    <li><a href="#{{ id }}">{{ text }}</a></li>
  {% endfor %}
</ul>
