<footer class="site-footer">
  <div class="footer-container">
    <div class="footer-section">
      <h4>{{ site.title }}</h4>
      <p>{{ site.description }}</p>
    </div>
    <div class="footer-section">
      <a href="https://github.com/{{ site.github_username }}"><i class="fa-brands fa-github"></i> GitHub</a>
      <a href="{{ '/rss.xml' | relative_url }}"><i class="fa-solid fa-rss"></i> RSS</a>
    </div>
  </div>
  <p class="footer-bottom">&copy; {{ "now" | date: "%Y" }} {{ site.title }}. Built for Speed & SEO.</p>
</footer>
