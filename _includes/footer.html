<footer class="site-footer">
  <div class="container">
    
    <!-- Footer Grid -->
    <div class="footer-grid">
      
      <!-- Footer Info -->
      <div class="footer-info">
        <h3>{{ site.title }}</h3>
        <p>{{ site.description }}</p>
      </div>
      
      <!-- Social Links -->
      <div class="footer-social">
        <a href="https://github.com/{{ site.github_username }}" target="_blank" aria-label="GitHub">
          <i class="fa-brands fa-github"></i>
        </a>
        <a href="{{ '/rss.xml' | relative_url }}" aria-label="RSS Feed">
          <i class="fa-solid fa-rss"></i>
        </a>
      </div>
      
    </div>
    
    <!-- Copyright -->
    <p class="copyright">
      &copy; {{ "now" | date: "%Y" }} {{ site.title }}. Built for Speed & SEO.
    </p>
    
  </div>
</footer>

<style>
/* ================= FOOTER STYLING ================= */
.site-footer{
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 2rem 1rem;
  color: var(--text);
  font-size: 14px;
}
.footer-grid{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:1.5rem;
  margin-bottom:1rem;
}
.footer-info h3{
  margin:0 0 0.5rem 0;
  color: var(--accent);
}
.footer-info p{
  margin:0;
  line-height:1.5;
}
.footer-social a{
  margin-left:0.75rem;
  color: var(--text);
  font-size:1.2rem;
  transition: color 0.3s, transform 0.3s;
}
.footer-social a:hover{
  color: var(--accent);
  transform: scale(1.2);
}
.copyright{
  text-align:center;
  color:#64748b;
  font-size:12px;
}

/* ================= MOBILE ================= */
@media(max-width:640px){
  .footer-grid{
    flex-direction:column;
    text-align:center;
    gap:1rem;
  }
  .footer-social a{
    margin:0 0.5rem;
  }
}
</style>
