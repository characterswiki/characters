<footer class="site-footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-info">
        <h3>{{ site.title }}</h3>
        <p>{{ site.description }}</p>
      </div>
      <div class="footer-social">
        <a href="https://github.com/{{ site.github_username }}"><i class="fa-brands fa-github"></i></a>
        <a href="{{ '/rss.xml' | relative_url }}"><i class="fa-solid fa-rss"></i></a>
      </div>
    </div>
    <p class="copyright">&copy; {{ "now" | date: "%Y" }} {{ site.title }}. Built for Speed & SEO.</p>
  </div>
</footer>
