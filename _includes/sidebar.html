<aside class="sidebar">

  <div class="sidebar-card">
    <h3>Search Characters</h3>
    <input type="text" id="sidebarSearch" placeholder="Search characters...">
  </div>

  <div class="sidebar-card collapsible">
    <h3 onclick="toggleSection(this)">Categories</h3>
    <ul>
      {% for category in site.categories %}
      <li>
        <a href="{{ site.baseurl }}/categories/#{{ category[0] }}">
          {{ category[0] }}
          <span class="count">{{ category[1].size }}</span>
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>

  <div class="sidebar-card collapsible">
    <h3 onclick="toggleSection(this)">Recent Characters</h3>
    <ul id="recentList">
      {% for post in site.posts limit:8 %}
      <li>
        <a href="{{ site.baseurl }}{{ post.url }}">
          {{ post.title }}
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>

</aside>
