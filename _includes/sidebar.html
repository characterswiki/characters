<aside class="sidebar">
<h3>Categories</h3>
<ul>
{% for category in site.categories %}
<li>
<a href="{{ site.baseurl }}/categories/#{{ category[0] }}">
{{ category[0] }} ({{ category[1].size }})
</a>
</li>
{% endfor %}
</ul>

<h3>Recent Characters</h3>
<ul>
{% for post in site.posts limit:5 %}
<li><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></li>
{% endfor %}
</ul>
</aside>
